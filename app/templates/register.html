<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户系统 - 注册</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="page-shell">
    <div class="card auth-card">
        <h1 class="title">用户系统</h1>
        <p class="subtitle">创建新账号后会自动登录，并进入商品销售管理页面。</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form class="form-grid" method="post">
            <label class="field">
                <span>用户名</span>
                <input name="username" placeholder="请输入用户名">
            </label>
            <label class="field">
                <span>密码</span>
                <input name="password" type="password" placeholder="密码至少 6 位">
            </label>
            <button class="btn" type="submit">注册并登录</button>
        </form>
        <p class="subtitle" style="margin-top: 18px;">已有账号？<a href="{{ url_for('web.login_page') }}">返回登录</a></p>
    </div>
</div>
</body>
</html>
