<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>注册</title>
</head>
<body>
<h2>注册</h2>
{% if error %}<p>{{ error }}</p>{% endif %}
<form method="post">
    <label>用户名：<input name="username" /></label><br />
    <label>密码：<input name="password" type="password" /></label><br />
    <button type="submit">注册</button>
</form>
<a href="/login-page">去登录</a>
</body>
</html>
